# ===============================================================
# SERVER & INFRASTRUCTURE
# ===============================================================
api.version=1.0
server.forward-headers-strategy=NATIVE
spring.main.banner-mode=off

# Multipart configurations for file uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=128MB
spring.servlet.multipart.max-request-size=128MB

# Static resources locations
spring.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/.

# DevTools exclusion to prevent unnecessary restarts
spring.devtools.restart.exclude=static/**,public/**,config/i18n/client/**,com/databasepreservation/server/client/**,com/databasepreservation/desktop/client/*

# ===============================================================
# PERSISTENCE & DATA SOURCE
# ===============================================================
# Primary Data Source Connection (Defaults to H2 file-based)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:~/.dbvtk/dbvtk-h2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# Connection Pool Settings
spring.datasource.hikari.maximumPoolSize=${BATCH_JOBS_MAX_POOL_SIZE:5}

# JPA & Hibernate Settings
# Use H2Dialect by default, override with PostgreSQLDialect for production
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
# 'update' is safer for persistent DBs like Postgres; 'create' was the original default
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Enable H2 Web Console (accessible only when using H2)
spring.h2.console.enabled=true

# ===============================================================
# SPRING BATCH
# ===============================================================
# Prevent jobs from running automatically on startup
spring.batch.job.enabled=false
# Ensure Batch tables are created automatically
spring.batch.jdbc.initialize-schema=always
# Platform hint for Batch SQL scripts (e.g., h2 or postgresql)
spring.batch.jdbc.platform=${SPRING_BATCH_JDBC_PLATFORM:h2}

# ===============================================================
# LOGGING
# ===============================================================
logging.level.org.springframework.boot.autoconfigure=INFO
# Silence verbose batch factory logs during execution
logging.level.org.springframework.batch.core.listener.AbstractListenerFactoryBean=ERROR

# ===============================================================
# WEB FRAMEWORK (JERSEY & JETTY)
# ===============================================================
spring.jersey.type=filter
spring.jersey.filter.order=-100000
spring.jetty.httpClient.max-buffer-size=120000000000

# ===============================================================
# SCHEDULER (QUARTZ)
# ===============================================================
org.quartz.scheduler.instanceName = MyScheduler
org.quartz.threadPool.threadCount = 1
org.quartz.jobStore.class = org.quartz.simpl.RAMJobStore

# ===============================================================
# METRICS & MONITORING (ACTUATOR & PROMETHEUS)
# ===============================================================
management.endpoint.metrics.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true